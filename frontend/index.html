<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- single Content Security Policy covering both development and production -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://checkout.razorpay.com https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net https://img1.wsimg.com https://www.googletagmanager.com https://www.google-analytics.com;
    worker-src 'self' blob:;
    connect-src 'self' http://localhost:5000 http://localhost:5173 https://mygym.qtechx.com https://api.razorpay.com https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://dhiva-deva-new-my-gym-2hs3.vercel.app;
    frame-src https://checkout.razorpay.com https://api.razorpay.com https://*.firebaseapp.com https://www.google.com https://accounts.google.com;
    img-src 'self' data: blob: https:;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
  " />
  <link rel="icon" type="image/png" href="/images/logo-dark.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnold Gym</title>
</head>

<body>
  <div id="root">
    <!-- ⚡ STATIC PRELOADER -->
    <style>
      .preloader-static {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 10001;
      }
      .loader-bar {
        width: 150px; height: 2px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px; overflow: hidden;
        margin-top: 20px;
      }
      .loader-prog {
        width: 30%; height: 100%;
        background: #ef4444;
        animation: prog 1.5s infinite ease-in-out;
      }
      @keyframes prog { 0% { transform: translateX(-100%); } 100% { transform: translateX(333%); } }
    </style>
    <div class="preloader-static">
      <img src="/images/logo-dark.png" alt="Logo" style="width: 80px; filter: brightness(1.5);">
      <div class="loader-bar"><div class="loader-prog"></div></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>

</html>
